<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建設シカクLAB - R6・R7完全版</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://liff.line.me/sdk/web/liff.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .header .user-info {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.8;
        }
        
        .content {
            padding: 30px 20px;
        }
        
        .screen {
            display: none;
        }
        
        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* 共通 */
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 22px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .btn-danger {
            background: #f44336;
            color: white;
        }
        
        .btn-danger:hover {
            background: #d32f2f;
        }
        
        /* ホーム画面 */
        .home-content {
            text-align: center;
        }
        
        .home-welcome {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
        }
        
        .home-button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .home-button {
            padding: 20px;
            border-radius: 8px;
            border: none;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .home-btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .home-btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        /* 年度・フィルタ選択 */
        .selector-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .selector-item label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .checkbox-item {
            display: flex;
            align-items: center;
        }
        
        .checkbox-item input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
        }
        
        .checkbox-item label {
            margin: 0;
            font-weight: normal;
            font-size: 14px;
            cursor: pointer;
        }
        
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .radio-item {
            display: flex;
            align-items: center;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .radio-item:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }
        
        .radio-item input[type="radio"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .radio-item label {
            margin: 0;
            font-weight: normal;
            font-size: 14px;
            cursor: pointer;
            flex: 1;
        }
        
        /* 出題画面 */
        .progress-bar {
            background: #f0f0f0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        
        .question-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
            color: #999;
        }
        
        .question-meta {
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
            color: #666;
        }
        
        .question-text {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #333;
            line-height: 1.8;
            font-size: 16px;
            border-left: 4px solid #667eea;
        }
        
        .question-image {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            margin: 20px 0;
            border-radius: 8px;
            background: #f0f0f0;
            border: 2px solid #eee;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .option {
            padding: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            line-height: 1.6;
        }
        
        .option:hover:not(.disabled) {
            border-color: #667eea;
            background: #f9f9f9;
        }
        
        .option.selected {
            border-color: #667eea;
            background: #e8eaf6;
        }
        
        .option.correct {
            border-color: #4caf50;
            background: #c8e6c9;
            color: #2e7d32;
            font-weight: 600;
        }
        
        .option.incorrect {
            border-color: #f44336;
            background: #ffcdd2;
            color: #c62828;
            font-weight: 600;
        }
        
        .option.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        .explanation-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }
        
        .explanation-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .explanation-text {
            color: #555;
            line-height: 1.8;
            font-size: 14px;
            white-space: pre-wrap;
        }
        
        /* 結果画面 */
        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #f0f0f0;
        }
        
        .stat-box .number {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-box .label {
            font-size: 13px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .category-stats {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .category-stats h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 10px;
            background: white;
            border-radius: 6px;
            border-left: 3px solid #667eea;
        }
        
        .category-name {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        .category-rate {
            color: #667eea;
            font-weight: 700;
            font-size: 14px;
        }
        
        .error {
            background: #fdf3f2;
            border: 2px solid #f44336;
            color: #f44336;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        /* ユーザー統計画面 */
        .user-info-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .user-info-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            font-weight: 600;
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .stats-card {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .stats-card h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .stat-item {
            background: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            border: 2px solid #f0f0f0;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stats-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        
        .stats-table thead {
            background: #f0f0f0;
        }
        
        .stats-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #333;
            font-size: 14px;
            border-bottom: 2px solid #ddd;
        }
        
        .stats-table td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #666;
        }
        
        .stats-table tr:last-child td {
            border-bottom: none;
        }
        
        .stats-table tbody tr:hover {
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>建設シカクLAB</h1>
            <p>解体工事施工技士試験対策</p>
            <div class="user-info" id="userInfoDisplay"></div>
        </div>
        
        <div class="content">
            <!-- 登録画面 -->
            <div class="screen active" id="registerScreen">
                <h2>ようこそ！</h2>
                
                <div class="input-group">
                    <label>LINE 表示名</label>
                    <input type="text" id="lineName" placeholder="山田太郎" value="テストユーザー">
                </div>
                
                <div class="input-group">
                    <label>業界経験年数</label>
                    <select id="expYears">
                        <option value="">選択してください</option>
                        <option value="未経験">未経験</option>
                        <option value="1年未満">1年未満</option>
                        <option value="1-3">1～3年</option>
                        <option value="3-5">3～5年</option>
                        <option value="5-10">5～10年</option>
                        <option value="10以上">10年以上</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label>現在の給与（万円）</label>
                    <input type="number" id="currentSalary" placeholder="400" value="400">
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="registerUser()">登録して開始</button>
                </div>
            </div>
            
            <!-- ホーム画面 -->
<div class="screen" id="homeScreen">
    <div class="home-content">
        <div class="home-welcome">
            こんにちは！<br>
            <span id="userGreeting"></span>さん
        </div>
        
        <div class="home-button-group">
            <button class="btn-danger" onclick="localStorage.clear(); location.reload();" style="width: 100%; margin-bottom: 20px;">
                【テスト用】登録情報を消して初期化する
            </button>
            <button class="home-button home-btn-start" onclick="goToSetting()">クイズを開始</button>
            <button class="home-button home-btn-start" style="background: #4caf50;" onclick="goToUserStats()">学習記録</button>
        </div>
    </div>
</div>
            
            <!-- ユーザー統計画面 -->
            <div class="screen" id="userStatsScreen">
                <h2>学習記録</h2>
                
                <!-- ユーザー情報 -->
                <div class="user-info-card">
                    <h3>ユーザー情報</h3>
                    <div class="info-row">
                        <span class="info-label">名前:</span>
                        <span class="info-value" id="statsUserName"></span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">経験年数:</span>
                        <span class="info-value" id="statsExpYears"></span>
                    </div>
                </div>
                
                <!-- 累計学習統計 -->
                <div class="stats-card">
                    <h3>累計学習統計</h3>
                    <div class="stats-grid">
                        <div class="stat-item">
                            <div class="stat-label">累計解答数</div>
                            <div class="stat-value" id="totalAnswered">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">累計正解数</div>
                            <div class="stat-value" id="totalCorrect">0</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">全体正解率</div>
                            <div class="stat-value" id="overallRate">0%</div>
                        </div>
                    </div>
                </div>
                
                <!-- 分野別統計 -->
                <div class="stats-card">
                    <h3>分野別統計</h3>
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>分野</th>
                                <th>正解数/総数</th>
                                <th>正解率</th>
                            </tr>
                        </thead>
                        <tbody id="categoryStatsTable">
                        </tbody>
                    </table>
                </div>
                
                <!-- 年度別統計 -->
                <div class="stats-card">
                    <h3>年度別統計</h3>
                    <table class="stats-table">
                        <thead>
                            <tr>
                                <th>年度</th>
                                <th>正解数/総数</th>
                                <th>正解率</th>
                            </tr>
                        </thead>
                        <tbody id="yearStatsTable">
                        </tbody>
                    </table>
                </div>
                
                <!-- 最終学習日時 -->
                <div class="stats-card">
                    <h3>最終学習日時</h3>
                    <div class="info-value" id="lastStudyTime">記録なし</div>
                </div>
                
                <div class="button-group">
                    <button class="btn-secondary" onclick="goToHome()">ホームに戻る</button>
                </div>
            </div>
            
            <!-- 出題設定画面 -->
            <div class="screen" id="settingScreen">
                <h2>出題設定</h2>
                
                <div class="selector-group">
                    <div class="selector-item">
                        <label>年度を選択</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" name="year" value="R6" id="yearR6" onchange="updateYear('R6')" checked>
                                <label for="yearR6">R6年度</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="year" value="R7" id="yearR7" onchange="updateYear('R7')">
                                <label for="yearR7">R7年度</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="selector-item">
                        <label>分野を選択</label>
                        <div class="checkbox-group" id="categoryCheckboxes"></div>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>出題方式</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="mode" value="sequential" id="modeSequential" onchange="updateMode()" checked>
                            <label for="modeSequential">順番通りに出題</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="mode" value="random" id="modeRandom" onchange="updateMode()">
                            <label for="modeRandom">ランダムに出題</label>
                        </div>
                    </div>
                </div>
                
                <div class="input-group">
                    <label>出題内容</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="scope" value="all" id="scopeAll" onchange="updateScope()" checked>
                            <label for="scopeAll">全問出題</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="scope" value="wrong" id="scopeWrong" onchange="updateScope()">
                            <label for="scopeWrong">間違えた問題だけ</label>
                        </div>
                    </div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="startQuiz()">クイズを開始</button>
                    <button class="btn-secondary" onclick="goToHome()">ホームに戻る</button>
                </div>
            </div>
            
            <!-- 出題画面 -->
            <div class="screen" id="quizScreen">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                
                <div class="question-info">
                    <span id="questionCount"></span> / <span id="totalCount"></span>
                    <div class="question-meta">
                        <span id="categoryBadge"></span>
                    </div>
                </div>
                
                <div class="question-text" id="questionText"></div>
                
                <img id="questionImage" class="question-image" style="display: none;">
                
                <div class="options" id="optionsContainer"></div>
                
                <div id="explanationContainer"></div>
                
                <div class="button-group">
                    <button class="btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">次へ</button>
                    <button class="btn-secondary" onclick="skipQuestion()" style="display: none;" id="skipBtn">スキップ</button>
                </div>
                <div class="button-group">
                    <button class="btn-danger" style="flex: 1;" onclick="confirmExitQuiz()">ホームに戻る</button>
                </div>
            </div>
            
            <!-- 結果画面 -->
            <div class="screen" id="resultScreen">
                <h2>クイズ完了！</h2>
                
                <div class="result-stats">
                    <div class="stat-box">
                        <div class="number" id="correctCount">0</div>
                        <div class="label">正解数</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="totalQuestionsCount">0</div>
                        <div class="label">総問題数</div>
                    </div>
                    <div class="stat-box">
                        <div class="number" id="correctRate">0%</div>
                        <div class="label">正解率</div>
                    </div>
                </div>
                
                <div class="category-stats" id="categoryStatsContainer" style="display: none;">
                    <h3>分野別正解率</h3>
                    <div id="categoryStatsList"></div>
                </div>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="goToSetting()">もう一度チャレンジ</button>
                    <button class="btn-secondary" onclick="goToHome()">ホームに戻る</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // グローバル変数
        let allQuestions = [];
        let filteredQuestions = [];
        let currentQuestionIndex = 0;
        let selectedAnswer = null;
        let answered = false;
        let correctCount = 0;
        let categoryStats = {};
        let wrongQuestionIds = [];
        let isRegistered = false;
        let availableCategories = [];
        
        let settings = {
            year: 'R6',
            categories: [],
            mode: 'sequential',
            scope: 'all'
        };
        
        let userId = 'test_' + Date.now();
        let userData = {};
        
        // リポジトリパス
        const REPO_BASE = window.location.pathname.includes('/shikaku-lab/') ? '/shikaku-lab/' : '/';
        
        // LINE LIFF ID（本番環境用）
        const LIFF_ID = '2009300790-G4amrGku';
        
        // 初期化
        window.addEventListener('DOMContentLoaded', () => {
            console.log('Page loaded');
            initializeLiff();
        });
        
        // LINE LIFF を初期化して LINE ユーザー ID を取得
        async function initializeLiff() {
            try {
                // LIFF SDK を初期化
                await liff.init({ liffId: LIFF_ID });
                console.log('LIFF initialized');
                
                // ユーザーがログインしているか確認
                if (liff.isLoggedIn()) {
                    console.log('User is logged in');
                    // LINE ユーザープロフィールを取得
                    const profile = await liff.getProfile();
                    console.log('Profile:', profile);
                    
                    // グローバル userId を LINE ユーザー ID に設定
                    userId = profile.userId;
                    console.log('LINE User ID:', userId);
                } else {
                    console.log('User is not logged in, redirecting to login');
                    // ユーザーがログインしていない場合は LINE ログインにリダイレクト
                    liff.login();
                    return;
                }
                
                // ユーザーデータを読み込み
                loadUserData();
            } catch (error) {
                console.error('LIFF Error:', error);
                // LIFF が利用できない場合（テスト環境など）はテスト ID を使用
                console.log('Using test ID');
                userId = 'test_' + Date.now();
                loadUserData();
            }
        };
        
        // ローカルストレージからユーザーデータを読み込み
        function loadUserData() {
            const stored = localStorage.getItem('shikakuLabUser');
            if (stored) {
                userData = JSON.parse(stored);
                userId = userData.lineUserId;
                isRegistered = true;
                displayUserInfo();
                showScreen('homeScreen');
            } else {
                showScreen('registerScreen');
            }
        }
        
        // ユーザー情報を表示
        function displayUserInfo() {
            document.getElementById('userGreeting').textContent = userData.lineName;
            document.getElementById('userInfoDisplay').textContent = `ユーザー: ${userData.lineName}`;
        }
        
        // JSON を読み込み
        async function loadQuestions(year) {
            try {
                const url = REPO_BASE + `questions_${year}.json`;
                console.log('Loading:', url);
                const response = await axios.get(url);
                return response.data.questions;
            } catch (error) {
                console.error('Error loading questions:', error);
                showError(`問題データの読み込みに失敗しました`);
                return [];
            }
        }
        
        // ユーザー登録
        async function registerUser() {
            const lineName = document.getElementById('lineName').value.trim();
            const expYears = document.getElementById('expYears').value;
            const currentSalary = parseInt(document.getElementById('currentSalary').value) || 0;
            
            if (!lineName) {
                showError('LINE 表示名を入力してください');
                return;
            }
            
            if (!expYears) {
                showError('業界経験年数を選択してください');
                return;
            }
            
            userData = {
                lineUserId: userId,
                lineName: lineName,
                expYears: expYears,
                currentSalary: currentSalary,
                registeredDate: new Date().toISOString()
            };
            
            // ローカルストレージに保存
            localStorage.setItem('shikakuLabUser', JSON.stringify(userData));
            isRegistered = true;
            
            // Webhook に送信
            await sendWebhook({
                action: 'register_user',
                ...userData
            });
            
            // ホーム画面に遷移
            displayUserInfo();
            showScreen('homeScreen');
        }
        
        // 年度更新
        async function updateYear(year) {
            settings.year = year;
            // 年度が変更されたとき、カテゴリーチェックボックスを動的に生成
            const questions = await loadQuestions(year);
            availableCategories = [...new Set(questions.map(q => q.category))];
            generateCategoryCheckboxes();
        }
        
        // カテゴリーチェックボックスを動的生成
        function generateCategoryCheckboxes() {
            const container = document.getElementById('categoryCheckboxes');
            container.innerHTML = '';
            availableCategories.forEach((category, index) => {
                const checkboxDiv = document.createElement('div');
                checkboxDiv.className = 'checkbox-item';
                checkboxDiv.innerHTML = `
                    <input type="checkbox" id="cat-${index}" value="${category}" onchange="updateCategories()" checked>
                    <label for="cat-${index}">${category}</label>
                `;
                container.appendChild(checkboxDiv);
            });
            // カテゴリーの初期化
            settings.categories = availableCategories.slice();
        }
        
        // 分野更新
        function updateCategories() {
            settings.categories = [];
            document.querySelectorAll('input[id^="cat-"]:checked').forEach(checkbox => {
                settings.categories.push(checkbox.value);
            });
        }
        
        // 出題方式更新
        function updateMode() {
            settings.mode = document.querySelector('input[name="mode"]:checked').value;
        }
        
        // 出題内容更新
        function updateScope() {
            settings.scope = document.querySelector('input[name="scope"]:checked').value;
        }
        
        // クイズ開始
        async function startQuiz() {
            if (settings.categories.length === 0) {
                showError('少なくとも1つの分野を選択してください');
                return;
            }
            
            // 問題を読み込み
            allQuestions = await loadQuestions(settings.year);
            
            if (allQuestions.length === 0) {
                showError('問題が見つかりませんでした');
                return;
            }
            
            // フィルタリング
            filterQuestions();
            
            if (filteredQuestions.length === 0) {
                showError('条件に合う問題が見つかりませんでした');
                return;
            }
            
            // ランダムに並び替え
            if (settings.mode === 'random') {
                shuffleArray(filteredQuestions);
            }
            
            // 初期化
            currentQuestionIndex = 0;
            correctCount = 0;
            categoryStats = {};
            
            showScreen('quizScreen');
            displayQuestion();
        }
        
        // 問題をフィルタリング
        function filterQuestions() {
            filteredQuestions = allQuestions.filter(q => {
                const categoryMatch = settings.categories.includes(q.category);
                const wrongMatch = settings.scope === 'all' || wrongQuestionIds.includes(q.id);
                return categoryMatch && wrongMatch;
            });
        }
        
        // 問題を表示
        function displayQuestion() {
            if (currentQuestionIndex >= filteredQuestions.length) {
                showResults();
                return;
            }
            
            const question = filteredQuestions[currentQuestionIndex];
            selectedAnswer = null;
            answered = false;
            
            // 進捗バー
            const progress = ((currentQuestionIndex) / filteredQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // 問題情報
            document.getElementById('questionCount').textContent = currentQuestionIndex + 1;
            document.getElementById('totalCount').textContent = filteredQuestions.length;
            document.getElementById('categoryBadge').textContent = question.category;
            
            // 問題文
            document.getElementById('questionText').textContent = question.question_text;
            
            // 画像
            const imgElement = document.getElementById('questionImage');
            if (question.has_image && question.image) {
                imgElement.src = `data:image/png;base64,${question.image}`;
                imgElement.style.display = 'block';
            } else {
                imgElement.style.display = 'none';
            }
            
            // 選択肢
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            for (let i = 1; i <= 4; i++) {
                const option = question.options[i.toString()];
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.textContent = `${i}. ${option.text}`;
                optionDiv.onclick = () => selectOption(i.toString(), optionDiv, question);
                optionsContainer.appendChild(optionDiv);
            }
            
            // 説明をクリア
            document.getElementById('explanationContainer').innerHTML = '';
            
            // ボタン
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('skipBtn').style.display = 'block';
        }
        
        // 選択肢を選択
        function selectOption(answerNum, element, question) {
            if (answered) return;
            
            selectedAnswer = answerNum;
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.add('disabled');
                opt.classList.remove('selected');
            });
            
            const isCorrect = answerNum === question.correct_answer;
            
            // すべての選択肢を無効化
            document.querySelectorAll('.option').forEach((opt, idx) => {
                const optNum = (idx + 1).toString();
                if (optNum === question.correct_answer) {
                    opt.classList.add('correct');
                } else if (optNum === answerNum && !isCorrect) {
                    opt.classList.add('incorrect');
                }
            });
            
            answered = true;
            if (isCorrect) {
                correctCount++;
                if (wrongQuestionIds.includes(question.id)) {
                    wrongQuestionIds = wrongQuestionIds.filter(id => id !== question.id);
                }
            } else {
                if (!wrongQuestionIds.includes(question.id)) {
                    wrongQuestionIds.push(question.id);
                }
            }
            
            // カテゴリ統計を更新
            if (!categoryStats[question.category]) {
                categoryStats[question.category] = { total: 0, correct: 0 };
            }
            categoryStats[question.category].total++;
            if (isCorrect) {
                categoryStats[question.category].correct++;
            }
            
            // 解説を表示
            const explanationDiv = document.getElementById('explanationContainer');
            const explanationBgColor = isCorrect ? '#c8e6c9' : '#ffcdd2';
            const explanationBorderColor = isCorrect ? '#4caf50' : '#f44336';
            const explanationTextColor = isCorrect ? '#2e7d32' : '#c62828';
            
            explanationDiv.innerHTML = `
                <div class="explanation-section" style="background-color: ${explanationBgColor}; border-left-color: ${explanationBorderColor};">
                    <div class="explanation-title" style="color: ${explanationTextColor};">${isCorrect ? '✓ 正解' : '✗ 不正解'}</div>
                    <div class="explanation-text" style="color: ${explanationTextColor};">${question.explanation}</div>
                </div>
            `;
            
            // Webhook に送信
            sendWebhook({
                action: 'answer_question',
                lineUserId: userId,
                questionId: question.id,
                year: question.year,
                category: question.category,
                questionNumber: question.question_number,
                userAnswer: parseInt(answerNum),
                isCorrect: isCorrect,
                quizMode: {
                    layer1: 'year',
                    layer2: settings.mode,
                    layer3: settings.scope,
                    filterName: settings.year + '年度'
                },
                answeredDate: new Date().toISOString()
            });
            
            document.getElementById('skipBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'block';
        }
        
        // 次の問題
        function nextQuestion() {
            currentQuestionIndex++;
            displayQuestion();
        }
        
        // スキップ
        function skipQuestion() {
            nextQuestion();
        }
        
        // クイズを途中で終了（結果画面に遷移）
        function confirmExitQuiz() {
            if (confirm('クイズを中断して結果を確認しますか？')) {
                showResults();
            }
        }
        
        // 結果を表示
        function showResults() {
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('totalQuestionsCount').textContent = filteredQuestions.length;
            const rate = filteredQuestions.length > 0 ? Math.round((correctCount / filteredQuestions.length) * 100) : 0;
            document.getElementById('correctRate').textContent = rate + '%';
            
            // 統計データを保存
            saveStatistics();
            
            // 分野別統計
            if (Object.keys(categoryStats).length > 0) {
                const categoryList = document.getElementById('categoryStatsList');
                categoryList.innerHTML = '';
                
                for (const [category, stats] of Object.entries(categoryStats)) {
                    const categoryRate = Math.round((stats.correct / stats.total) * 100);
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category-item';
                    categoryDiv.innerHTML = `
                        <span class="category-name">${category}</span>
                        <span class="category-rate">${stats.correct}/${stats.total} (${categoryRate}%)</span>
                    `;
                    categoryList.appendChild(categoryDiv);
                }
                
                document.getElementById('categoryStatsContainer').style.display = 'block';
            }
            
            showScreen('resultScreen');
        }
        
        // 統計データを保存
        function saveStatistics() {
            const statsKey = `shikakuLabStats_${userId}`;
            let stats = {
                totalAnswers: 0,
                totalCorrect: 0,
                categoryStats: {},
                yearStats: {},
                lastStudyDate: new Date().toISOString()
            };
            
            // 既存の統計データを取得
            const stored = localStorage.getItem(statsKey);
            if (stored) {
                stats = JSON.parse(stored);
            }
            
            // 統計を更新
            stats.totalAnswers += filteredQuestions.length;
            stats.totalCorrect += correctCount;
            stats.lastStudyDate = new Date().toISOString();
            
            // 分野別統計を更新
            for (const [category, catStats] of Object.entries(categoryStats)) {
                if (!stats.categoryStats[category]) {
                    stats.categoryStats[category] = { correct: 0, total: 0 };
                }
                stats.categoryStats[category].correct += catStats.correct;
                stats.categoryStats[category].total += catStats.total;
            }
            
            // 年度別統計を更新
            if (!stats.yearStats[settings.year]) {
                stats.yearStats[settings.year] = { correct: 0, total: 0 };
            }
            stats.yearStats[settings.year].correct += correctCount;
            stats.yearStats[settings.year].total += filteredQuestions.length;
            
            // ローカルストレージに保存
            localStorage.setItem(statsKey, JSON.stringify(stats));
            console.log('Statistics saved:', stats);
        }
        
        // Webhook に送信
        async function sendWebhook(data) {
            try {
                const webhookUrl = 'https://hook.eu1.make.com/4i8ovi6kunvugp2w4u59kgjgr1quq2is';
                await axios.post(webhookUrl, data);
                console.log('Webhook sent:', data);
            } catch (error) {
                console.error('Webhook error:', error);
            }
        }
        
        // 画面切り替え
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }
        
        // ナビゲーション
        function goToHome() {
            showScreen('homeScreen');
        }
        
        async function goToSetting() {
            // 出題設定画面に移る前に、R6 のカテゴリーを初期化
            const questions = await loadQuestions('R6');
            availableCategories = [...new Set(questions.map(q => q.category))];
            generateCategoryCheckboxes();
            showScreen('settingScreen');
        }
        
        // ユーザー統計画面を表示
        function goToUserStats() {
            loadUserStats();
            showScreen('userStatsScreen');
        }
        
        // ユーザー統計を読み込み
        function loadUserStats() {
            // ユーザー情報を表示
            document.getElementById('statsUserName').textContent = userData.lineName || '-';
            document.getElementById('statsExpYears').textContent = userData.expYears || '-';
            
            // ローカルストレージから統計データを取得
            const statsKey = `shikakuLabStats_${userId}`;
            const statsData = localStorage.getItem(statsKey);
            
            if (statsData) {
                const stats = JSON.parse(statsData);
                
                // 累計学習統計
                document.getElementById('totalAnswered').textContent = stats.totalAnswers || 0;
                document.getElementById('totalCorrect').textContent = stats.totalCorrect || 0;
                const rate = stats.totalAnswers > 0 ? Math.round((stats.totalCorrect / stats.totalAnswers) * 100) : 0;
                document.getElementById('overallRate').textContent = rate + '%';
                
                // 分野別統計
                const categoryTable = document.getElementById('categoryStatsTable');
                categoryTable.innerHTML = '';
                
                const categoryStats = stats.categoryStats || {};
                for (const [category, catData] of Object.entries(categoryStats)) {
                    const catRate = catData.total > 0 ? Math.round((catData.correct / catData.total) * 100) : 0;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${category}</td>
                        <td>${catData.correct}/${catData.total}</td>
                        <td>${catRate}%</td>
                    `;
                    categoryTable.appendChild(row);
                }
                
                // 年度別統計
                const yearTable = document.getElementById('yearStatsTable');
                yearTable.innerHTML = '';
                
                const yearStats = stats.yearStats || {};
                for (const [year, yearData] of Object.entries(yearStats)) {
                    const yearRate = yearData.total > 0 ? Math.round((yearData.correct / yearData.total) * 100) : 0;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${year}年度</td>
                        <td>${yearData.correct}/${yearData.total}</td>
                        <td>${yearRate}%</td>
                    `;
                    yearTable.appendChild(row);
                }
                
                // 最終学習日時
                if (stats.lastStudyDate) {
                    const lastDate = new Date(stats.lastStudyDate);
                    const formattedDate = lastDate.toLocaleString('ja-JP');
                    document.getElementById('lastStudyTime').textContent = formattedDate;
                }
            } else {
                // 統計データが存在しない場合
                document.getElementById('totalAnswered').textContent = 0;
                document.getElementById('totalCorrect').textContent = 0;
                document.getElementById('overallRate').textContent = '0%';
                document.getElementById('categoryStatsTable').innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">まだ学習記録がありません</td></tr>';
                document.getElementById('yearStatsTable').innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">まだ学習記録がありません</td></tr>';
            }
        }
        
        // エラー表示
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            document.querySelector('.content').insertBefore(errorDiv, document.querySelector('.content').firstChild);
            setTimeout(() => errorDiv.remove(), 5000);
        }
        
        // 配列をシャッフル
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
    </script>
</body>
</html>
