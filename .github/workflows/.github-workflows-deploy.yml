name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Verify files
        run: |
          echo "✓ Checking required files..."
          test -f "liff_prototype_r3_with_make.html" && echo "  ✓ HTML file exists"
          test -f "questions_R3.json" && echo "  ✓ JSON file exists"
          test -f "README.md" && echo "  ✓ README exists"
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          cname: # カスタムドメイン使用時はここに記入（例: shikaku-lab.com）

