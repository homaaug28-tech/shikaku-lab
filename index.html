    let userProfile = null;
    let currentQuestion = null;
    let currentQuestionIndex = 0;
    let answerHistory = {}; // { questionId: { correct, date } }
    let userStats = { totalAttempts: 0, totalCorrect: 0 };

    // ===== ローカルストレージ管理 =====
    function loadAnswerHistory() {
        const stored = localStorage.getItem('answerHistory');
        if (stored) {
            answerHistory = JSON.parse(stored);
        }
    }

    function saveAnswerHistory() {
        localStorage.setItem('answerHistory', JSON.stringify(answerHistory));
    }

    function loadUserStats() {
        const stored = localStorage.getItem('userStats');
        if (stored) {
            userStats = JSON.parse(stored);
        }
    }

    function saveUserStats() {
        localStorage.setItem('userStats', JSON.stringify(userStats));
    }

    // ===== 初期化 =====
    async function initializeLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                userProfile = await liff.getProfile();
                loadAnswerHistory();
                loadUserStats();
                updateHomeScreen();
            }
        } catch (error) {
            console.error("LIFF初期化エラー:", error);
        }
    }

    // ===== ページ遷移 =====
    function goToPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');

        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (pageId === 'home') document.querySelectorAll('.tab-btn')[0].classList.add('active');
        else if (pageId === 'quizList') document.querySelectorAll('.tab-btn')[1].classList.add('active');
        else if (pageId === 'mypage') document.querySelectorAll('.tab-btn')[2].classList.add('active');

        if (pageId === 'quiz') loadTodayQuiz();
        else if (pageId === 'quizList') loadQuizList();
        else if (pageId === 'mypage') updateMypageScreen();

        document.querySelector('.content').scrollTop = 0;
    }

    // ===== ホーム画面更新 =====
    function updateHomeScreen() {
        if (!userProfile) return;
        document.getElementById('homeName').textContent = userProfile.displayName;
        document.getElementById('totalAttempts').textContent = userStats.totalAttempts;
        
        const rate = userStats.totalAttempts > 0 
            ? Math.round((userStats.totalCorrect / userStats.totalAttempts) * 100) 
            : 0;
        document.getElementById('correctRate').textContent = rate + '%';
    }

    // ===== クイズ読み込み =====
    function loadTodayQuiz() {
        // ランダムに問題を選択
        currentQuestionIndex = Math.floor(Math.random() * questionDatabase.length);
        currentQuestion = questionDatabase[currentQuestionIndex];
        renderQuizScreen(currentQuestion);
    }

    // ===== クイズ画面レンダリング =====
    function renderQuizScreen(quiz) {
        document.getElementById('quizId').textContent = quiz.year;
        document.getElementById('quizProgress').textContent = `問${quiz.question_number}/${questionDatabase.length}`;
        document.getElementById('questionText').textContent = quiz.question_text;

        const optionsContainer = document.getElementById('optionsContainer');
        optionsContainer.innerHTML = '';

        ['1', '2', '3', '4'].forEach((key) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<strong>${key}.</strong> ${quiz.options[key]}`;
            btn.onclick = () => selectOption(parseInt(key), quiz);
            optionsContainer.appendChild(btn);
        });
    }

    // ===== 選択肢選択 =====
    function selectOption(selectedNum, quiz) {
        const isCorrect = selectedNum === quiz.correct_answer;
        
        // ローカルストレージに記録
        const questionId = `${quiz.year}_q${quiz.question_number}`;
        answerHistory[questionId] = {
            correct: isCorrect,
            date: new Date().toISOString(),
            userAnswer: selectedNum
        };
        saveAnswerHistory();

        // 統計情報を更新
        userStats.totalAttempts++;
        if (isCorrect) {
            userStats.totalCorrect++;
        }
        saveUserStats();

        // Airtableに送信（非同期）
        saveAnswerToAirtable(quiz.year, quiz.question_number, selectedNum, isCorrect);

        // 結果画面を表示
        showResult(isCorrect, quiz, selectedNum);
    }

    // ===== 結果表示 =====
    function showResult(isCorrect, quiz, selectedAnswer) {
        const resultIcon = document.getElementById('resultIcon');
        const resultText = document.getElementById('resultText');
        const explanationText = document.getElementById('explanationText');

        if (isCorrect) {
            resultIcon.textContent = '✅';
            resultText.textContent = '正解です！';
            resultText.className = 'result-text correct';
        } else {
            resultIcon.textContent = '❌';
            resultText.textContent = '残念...';
            resultText.className = 'result-text incorrect';

            // 不正解時は正解を表示
            const correctAnswer = quiz.correct_answer;
            explanationText.innerHTML = `<strong>正解: ${correctAnswer}. ${quiz.options[correctAnswer]}</strong><br><br>もう一度確認して次回に活かしましょう。`;
        }

        if (isCorrect) {
            explanationText.textContent = '素晴らしい！この分野をマスターしています。';
        }

        goToPage('result');
    }

    // ===== クイズ一覧読み込み =====
    function loadQuizList() {
        const quizzes = questionDatabase.map(q => ({
            id: `${q.year}_q${q.question_number}`,
            year: q.year,
            number: q.question_number,
            status: answerHistory[`${q.year}_q${q.question_number}`] 
                ? (answerHistory[`${q.year}_q${q.question_number}`].correct ? 'correct' : 'incorrect')
                : 'unanswered'
        }));

        renderQuizList(quizzes);
    }

    // ===== クイズリストレンダリング =====
    function renderQuizList(quizzes) {
        const container = document.getElementById('quizListContainer');
        container.innerHTML = '';

        quizzes.forEach(quiz => {
            const item = document.createElement('div');
            item.className = 'quiz-item';
            item.onclick = () => retakeQuiz(quiz);

            const statusEl = document.createElement('div');
            statusEl.className = `quiz-item-status ${quiz.status}`;
            statusEl.innerHTML = quiz.status === 'correct' ? '✓' : (quiz.status === 'incorrect' ? '✗' : '?');

            const content = document.createElement('div');
            content.className = 'quiz-item-content';
            content.innerHTML = `
                <div class="quiz-item-title">${quiz.year} 問${quiz.number}</div>
                <div class="quiz-item-category">
                    ${quiz.status === 'correct' ? '✅ 正解' : (quiz.status === 'incorrect' ? '❌ 不正解' : '未回答')}
                </div>
            `;

            item.appendChild(statusEl);
            item.appendChild(content);
            container.appendChild(item);
        });
    }

    // ===== マイページ更新 =====
    function updateMypageScreen() {
        if (!userProfile) return;
        document.getElementById('mypageName').textContent = userProfile.displayName;
        document.getElementById('mypageTotal').textContent = userStats.totalAttempts + '問';
        document.getElementById('mypageCorrect').textContent = userStats.totalCorrect + '問';
        
        const rate = userStats.totalAttempts > 0 
            ? Math.round((userStats.totalCorrect / userStats.totalAttempts) * 100) 
            : 0;
        document.getElementById('mypageRate').textContent = rate + '%';
        document.getElementById('rateBar').style.width = rate + '%';
    }

    // ===== Airtable保存 =====
    async function saveAnswerToAirtable(year, questionNumber, userAnswer, isCorrect) {
        const data = {
            lineUserId: userProfile.userId,
            lineName: userProfile.displayName,
            questionId: `${year}_q${questionNumber}`,
            year: year,
            questionNumber: questionNumber,
            userAnswer: userAnswer,
            isCorrect: isCorrect,
            answeredDate: new Date().toISOString()
        };

        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'application/json' }
            });
            console.log("回答を保存しました:", data);
        } catch (error) {
            console.error("保存エラー:", error);
        }
    }

    // ===== その他関数 =====
    function filterByYear(year) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
    }

    function retakeQuiz(quiz) {
        console.log("再チャレンジ:", quiz.id);
        goToPage('quiz');
    }

    function nextQuiz() {
        goToPage('quiz');
    }

    // ===== 初期化実行 =====
    initializeLiff();
</script>
